<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SmokySignal · King County</title>
<style>
  html, body { margin: 0; padding: 0; background: #1a1816; color: #eef0f3; }
  body { font-family: Inter, -apple-system, system-ui, sans-serif; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="map.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "smokyAirborne": true,
  "riderMph": 62,
  "speedLimit": 60,
  "showAdmin": false
}/*EDITMODE-END*/;

// Phone frame wrapper with bottom nav
function Phone({ title, children, screen, onTab }) {
  const T = window.SS_TOKENS;
  return (
    <div style={{
      width: 390, height: 780, background: T.bg0, color: T.fg0,
      borderRadius: 36, overflow: 'hidden', position: 'relative',
      border: `1px solid ${T.hairline2}`,
      boxShadow: '0 30px 80px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.04)',
      fontFamily: window.SS_FONT.ui,
    }} className="ss-app">
      {/* status bar */}
      <div style={{
        position: 'absolute', top: 0, left: 0, right: 0, zIndex: 5, height: 44,
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        padding: '14px 22px 0', fontSize: 14, fontWeight: 600, color: T.fg0,
      }}>
        <span>9:41</span>
        <span style={{ fontSize: 11, color: T.fg2, letterSpacing: '.08em' }}>{title}</span>
        <span style={{ display: 'flex', gap: 5 }}>
          <span style={{ width: 16, height: 10, background: T.fg0, borderRadius: 1, opacity: .9 }}/>
          <span style={{ width: 22, height: 10, border: `1px solid ${T.fg0}99`, borderRadius: 3, position: 'relative' }}>
            <span style={{ position: 'absolute', inset: 1, background: T.fg0, borderRadius: 1 }}/>
          </span>
        </span>
      </div>
      <div style={{ position: 'absolute', inset: '44px 0 0 0', overflow: 'hidden' }}>
        <div style={{ height: '100%', overflowY: 'auto' }} className="ss-scroll">
          {children}
        </div>
      </div>
      {/* tab bar */}
      <div style={{
        position: 'absolute', left: 0, right: 0, bottom: 0, padding: '8px 6px 14px',
        background: 'linear-gradient(to top, rgba(11,13,16,.96), rgba(11,13,16,.7))',
        backdropFilter: 'blur(20px)', borderTop: `.5px solid ${T.hairline}`,
        display: 'flex', justifyContent: 'space-around',
      }}>
        {[
          { id: 'home',   icon: '◉', label: 'Status' },
          { id: 'map',    icon: '◈', label: 'Radar'  },
          { id: 'zones',  icon: '◬', label: 'Zones'  },
          { id: 'admin',  icon: '⊟', label: 'Tails'  },
        ].map(t => (
          <button key={t.id} onClick={() => onTab?.(t.id)} style={{
            background: 'transparent', border: 0, cursor: 'pointer',
            display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2,
            padding: '4px 10px', color: screen === t.id ? T.alert : T.fg2,
          }}>
            <span style={{ fontSize: 16 }}>{t.icon}</span>
            <span style={{ fontSize: 10, fontWeight: 600, letterSpacing: '.05em' }}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

function PrototypeFrame({ home }) {
  const [screen, setScreen] = React.useState('home');
  const [tail, setTail] = React.useState('N305DK');
  const goto = (s, t) => { setScreen(s); if (t) setTail(t); };

  let body, label;
  if (screen === 'home') {
    label = 'STATUS';
    body = home === 'glance' ? <ScreenGlanceable goto={goto}/>
         : home === 'radar'  ? <ScreenRadar goto={goto}/>
         : <ScreenDashboard goto={goto}/>;
  } else if (screen === 'map') { label = 'RADAR'; body = <ScreenRadar goto={goto}/>; }
  else if (screen === 'zones') { label = 'HOT ZONES'; body = <ScreenZones goto={goto}/>; }
  else if (screen === 'admin') { label = 'TAILS'; body = <ScreenAdmin goto={goto}/>; }
  else if (screen === 'detail') { label = 'AIRCRAFT'; body = <ScreenDetail tail={tail} goto={goto}/>; }

  return <Phone title={label} screen={screen === 'detail' ? 'home' : screen} onTab={(t) => goto(t)}>{body}</Phone>;
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Apply tweaks to data
  React.useEffect(() => {
    const smoky = window.SS_DATA.LIVE_SNAPSHOT.aircraft.find(a => a.tail === 'N305DK');
    if (smoky) smoky.airborne = !!t.smokyAirborne;
  }, [t.smokyAirborne]);

  return (
    <DesignCanvas>
      <DCSection id="homes" title="SmokySignal" subtitle="Three home-screen takes for King County riders. Tap a card to focus.">
        <DCArtboard id="glance"    label="A · Glanceable"  width={390} height={780}>
          <PrototypeFrame home="glance"/>
        </DCArtboard>
        <DCArtboard id="radar"     label="B · Radar"       width={390} height={780}>
          <PrototypeFrame home="radar"/>
        </DCArtboard>
        <DCArtboard id="dashboard" label="C · Dashboard"   width={390} height={780}>
          <PrototypeFrame home="dashboard"/>
        </DCArtboard>
      </DCSection>

      <DCSection id="screens" title="Supporting screens" subtitle="Same app, deeper views.">
        <DCArtboard id="detail" label="Plane detail · Smoky" width={390} height={780}>
          <Phone title="AIRCRAFT" screen="home" onTab={()=>{}}><ScreenDetail tail="N305DK" goto={()=>{}}/></Phone>
        </DCArtboard>
        <DCArtboard id="zones-s" label="Hot zones + forecast" width={390} height={780}>
          <Phone title="HOT ZONES" screen="zones" onTab={()=>{}}><ScreenZones goto={()=>{}}/></Phone>
        </DCArtboard>
        <DCArtboard id="admin-s" label="Tail registry / admin" width={390} height={780}>
          <Phone title="TAILS" screen="admin" onTab={()=>{}}><ScreenAdmin goto={()=>{}}/></Phone>
        </DCArtboard>
        <DCArtboard id="warn" label="Speed warning · active" width={390} height={780}>
          <Phone title="ALERT" screen="home" onTab={()=>{}}><ScreenSpeedWarning/></Phone>
        </DCArtboard>
      </DCSection>

      <TweaksPanel>
        <TweakSection label="Live state" />
        <TweakToggle label="Smoky airborne" value={t.smokyAirborne}
          onChange={v => setTweak('smokyAirborne', v)}/>
        <TweakSlider label="Rider speed" value={t.riderMph} min={20} max={120} unit="mph"
          onChange={v => setTweak('riderMph', v)}/>
        <TweakSlider label="Speed limit" value={t.speedLimit} min={25} max={75} unit="mph"
          onChange={v => setTweak('speedLimit', v)}/>
      </TweaksPanel>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<!-- Architecture / context note for the reader -->
<script type="application/json" id="ss-architecture">
{
  "production_path": [
    "Vercel project with /api/aircraft serverless function",
    "Polls adsb.fi (primary, free) every 15s, falls back to OpenSky (also free)",
    "Filters ADS-B feed to TAIL_REGISTRY (in this repo as a JSON file)",
    "Stores rolling 30-day track history in Vercel KV for hot-zone learning",
    "Web Push via /api/subscribe + service worker for 'Smoky just went up' alerts",
    "Geolocation API in-browser (no native app needed) for the speed warning",
    "Add-to-Home-Screen PWA so riders can launch like an app, push works in background"
  ]
}
</script>

</body>
</html>
